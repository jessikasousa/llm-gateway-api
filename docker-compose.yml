services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-gateway-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - genai-network

  db:
    image: postgres:16-alpine
    container_name: llm-gateway-db
    environment:
      POSTGRES_DB: llm_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genai-network

  redis:
    image: redis:7-alpine
    container_name: llm-gateway-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - genai-network

volumes:
  postgres_data:

networks:
  genai-network:
    driver: bridge
